<div class="row">
    <div class="col-4 bg-green ps-5">
        <img src="assets/images/logo.png" alt="logo" class="logo">
    </div>
</div>
<div class="row">
    <div class="col-sm-8 col-md-4 bg-green pe-0 ps-5 signup-container">
        <div class="card signup-box">
                <div class="card-body">
                    <h4 class="text-green text-center mb-5">Sign up</h4>
                    <form [formGroup]="signupForm">
                        <div class="form-floating mb-4">
                            <input type="text" class="form-control" id="name" formControlName="name" placeholder="Name">
                            <label for="name">Name</label>
                          </div>
                        <div class="form-floating mb-4">
                            <input type="email" class="form-control" id="email" formControlName="email" placeholder="Email">
                            <label for="email">Email Id</label>
                          </div>
                          <div class="input-group mb-2">
                            <div class="form-floating">
                                <input [type]="showPassword ? 'text' : 'password'"  class="form-control" id="password" formControlName="password" placeholder="Password">
                                <div class="input-group-append">
                                    <span class="input-group-text bg-white border-0" >
                                        <i class="fa fa-eye" aria-hidden="true" (click)="showPassword = !showPassword"></i>
                                    </span>
                                </div>
                            </div>

                          </div>

                          <div class="row mb-4">
                              <div class="col-12 text-center">
                                  <button type="submit" class="btn btn-primary btn-green" [disabled]="!signupForm.valid">Sign up</button>
                              </div>
                          </div>
                            <div class="row">
                                <div class="col-12 text-center">
                                    <p class="label">Already have an account?</p>
                                    <a routerLink="../sign-up" class="text-green ml-1">Login</a>
                                </div>
                            </div>
                    </form>
                </div>
        </div>
    </div>
    <div class="col-sm-4 col-md-8 ps-0 pe-5 quote-box-container">
        <div class="card bg-green text-white quote-box">
            <div class="card-body">
                <h2 class="text-center mb-4 text-bold">MOMENTS</h2>
                <h3 class="d-flex justify-content-center"> "Formal education will make you a living; self-education will make you a fortune." </h3>
                <h3 class="d-flex justify-content-end"> -- Jim Rohn, Entrepreneur</h3>
            </div>
        </div>
    </div>
</div>
